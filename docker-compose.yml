services:
  milvus-standalone:
    image: milvusdb/milvus:v2.5.4
    command: ["milvus", "run", "standalone"]
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: local
    volumes:
      - milvus-data:/var/lib/milvus
      - milvus-etcd:/milvus/default.etcd
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9091/healthz"]
      interval: 10s
      retries: 30
      start_period: 240s

  backend:
    build: ./backend
    ports:
      - "8010:8010"
    depends_on:
      milvus-standalone:
        condition: service_healthy
    env_file: .env
    environment:
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-bge-m3}
      EMBEDDING_MODEL_PATH: /models/embedding
      MILVUS_URI: http://milvus-standalone:19530
    volumes:
      - ./data:/app/data
      - ${EMBEDDING_MODEL_HOST_PATH:?Set EMBEDDING_MODEL_HOST_PATH in .env}:/models/embedding:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 5s
      retries: 10
      start_period: 15s

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_TARGET: http://backend:8010

volumes:
  milvus-data:
  milvus-etcd:
