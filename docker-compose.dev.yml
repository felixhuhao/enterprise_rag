# Development override: run app code from the working tree.
#
# Usage (local BGE-M3 embedding):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml \
#     -f docker-compose.local-embedding.yml up -d
#
# For Qwen embedding (no local model), drop docker-compose.local-embedding.yml.
#
# Do not use `--build` for normal source edits. Rebuild only when Dockerfiles,
# requirements.txt, package.json, or package-lock.json change.
services:
  backend:
    command:
      - sh
      - -c
      - |
          pip install --quiet bcrypt && exec uvicorn app.main:app --host 0.0.0.0 --port 8010 --reload --reload-dir /app/app --reload-dir /app/scripts
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/scripts:/app/scripts:ro
      - ./data:/app/data

  frontend:
    volumes:
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro
